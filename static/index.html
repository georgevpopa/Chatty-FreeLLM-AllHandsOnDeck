<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Hands On Deck</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
    header{background:#16213e;padding:0.75rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid #0f3460;flex-wrap:wrap}
    header h1{font-size:1.1rem;color:#e94560;white-space:nowrap}
    .status-bar{display:flex;gap:0.4rem;flex-wrap:wrap;flex:1}
    .badge{padding:2px 8px;border-radius:12px;font-size:0.72rem;font-weight:600}
    .online{background:#1a4731;color:#4ade80}
    .offline{background:#4a1a1a;color:#f87171}
    .configured{background:#1a3a4a;color:#60a5fa}
    .no_key{background:#2a2a2a;color:#888}
    .usage-bar{display:flex;gap:0.4rem;flex-wrap:wrap;font-size:0.72rem;color:#888}
    .usage-item{background:#0f3460;padding:2px 8px;border-radius:12px}
    main{display:flex;flex:1;overflow:hidden}
    aside{width:240px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;overflow:hidden}
    .aside-tabs{display:flex;border-bottom:1px solid #0f3460}
    .aside-tab{flex:1;padding:6px;text-align:center;cursor:pointer;font-size:0.75rem;color:#888;background:none;border:none}
    .aside-tab.active{color:#e0e0e0;background:#0f3460}
    .aside-content{flex:1;overflow-y:auto;padding:0.75rem}
    .section-title{font-size:0.75rem;text-transform:uppercase;color:#888;letter-spacing:1px;margin-bottom:6px;margin-top:10px}
    .section-title:first-child{margin-top:0}
    .model-btn{width:100%;background:#0f3460;border:1px solid #1a4a7a;color:#e0e0e0;padding:5px 8px;border-radius:5px;cursor:pointer;text-align:left;font-size:0.8rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .model-btn:hover{background:#1a5a9a}
    .model-btn.active{background:#e94560;border-color:#e94560}
    .task-btn{width:100%;background:#1a3a1a;border:1px solid #2a5a2a;color:#a0d0a0;padding:5px 8px;border-radius:5px;cursor:pointer;text-align:left;font-size:0.8rem;margin-bottom:3px}
    .task-btn:hover{background:#2a5a2a}
    .recommendation{background:#0a2a0a;border:1px solid #2a5a2a;border-radius:6px;padding:8px;margin-top:8px;font-size:0.78rem;color:#a0d0a0;display:none}
    .nim-search{width:100%;background:#0f3460;border:1px solid #1a4a7a;color:#e0e0e0;border-radius:5px;padding:5px 8px;font-size:0.8rem;margin-bottom:6px}
    .nim-search:focus{outline:none;border-color:#e94560}
    .nim-list{display:flex;flex-direction:column;gap:3px;max-height:300px;overflow-y:auto}
    .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
    .msg{max-width:80%;padding:10px 14px;border-radius:10px;line-height:1.5;white-space:pre-wrap;word-break:break-word;font-size:0.9rem}
    .msg.user{background:#0f3460;align-self:flex-end}
    .msg.assistant{background:#16213e;border:1px solid #0f3460;align-self:flex-start}
    .msg.system{background:#1a3a1a;border:1px solid #2a5a2a;align-self:center;font-size:0.82rem;color:#4ade80}
    .msg.error{background:#3a1a1a;border:1px solid #e94560;align-self:center;font-size:0.82rem;color:#f87171}
    .input-area{padding:1rem;border-top:1px solid #0f3460;display:flex;gap:0.5rem;background:#16213e}
    textarea{flex:1;background:#0f3460;border:1px solid #1a4a7a;color:#e0e0e0;border-radius:8px;padding:8px 12px;resize:none;font-size:0.9rem;height:44px;max-height:150px}
    textarea:focus{outline:none;border-color:#e94560}
    button.send{background:#e94560;color:white;border:none;border-radius:8px;padding:0 18px;cursor:pointer;font-weight:600}
    button.send:disabled{background:#555;cursor:not-allowed}
    .tabs{display:flex;gap:4px;padding:0.5rem 1rem;background:#16213e;border-bottom:1px solid #0f3460}
    .tab{padding:4px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;color:#888}
    .tab.active{background:#0f3460;color:#e0e0e0}
    .aider-area{flex:1;display:none;flex-direction:column;padding:1.5rem;gap:1rem;overflow-y:auto}
    .aider-area.visible{display:flex}
    .chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .chat-wrap.hidden{display:none}
    input[type=text]{background:#0f3460;border:1px solid #1a4a7a;color:#e0e0e0;border-radius:8px;padding:8px 12px;font-size:0.9rem;width:100%}
    input[type=text]:focus{outline:none;border-color:#e94560}
    button.run{background:#0f3460;color:#60a5fa;border:1px solid #1a4a7a;border-radius:8px;padding:8px 20px;cursor:pointer}
    pre{background:#0a0a1a;border:1px solid #0f3460;border-radius:8px;padding:1rem;overflow-x:auto;font-size:0.8rem;color:#a0c4ff;white-space:pre-wrap}
    .selected-label{font-size:0.78rem;color:#888;padding:4px 1rem;background:#16213e}
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:#0f3460} ::-webkit-scrollbar-thumb{background:#e94560;border-radius:2px}
  </style>
</head>
<body>
<header>
  <h1>🤝 All Hands On Deck</h1>
  <div class="status-bar" id="statusBar">loading...</div>
  <div class="usage-bar" id="usageBar"></div>
</header>

<main>
  <aside>
    <div class="aside-tabs">
      <button class="aside-tab active" onclick="showAsideTab('models')">Models</button>
      <button class="aside-tab" onclick="showAsideTab('tasks')">Tasks</button>
      <button class="aside-tab" onclick="showAsideTab('nim')">NIM</button>
    </div>

    <!-- Models tab -->
    <div class="aside-content" id="asideModels">
      <div class="section-title">Local (Ollama)</div>
      <div id="localModels"></div>
      <div class="section-title">Cloud (Free)</div>
      <div id="cloudModels"></div>
    </div>

    <!-- Tasks tab -->
    <div class="aside-content" id="asideTasks" style="display:none">
      <div class="section-title">What do you need?</div>
      <button class="task-btn" onclick="recommend('code')">💻 Code generation</button>
      <button class="task-btn" onclick="recommend('logs')">📋 Log analysis</button>
      <button class="task-btn" onclick="recommend('writing')">✍️ Writing / docs</button>
      <button class="task-btn" onclick="recommend('explain')">🔍 Deep explanation</button>
      <button class="task-btn" onclick="recommend('fast')">⚡ Fast response</button>
      <button class="task-btn" onclick="recommend('local')">🔒 Private (local only)</button>
      <div class="recommendation" id="recommendation"></div>
    </div>

    <!-- NIM tab -->
    <div class="aside-content" id="asideNim" style="display:none">
      <div class="section-title">NVIDIA NIM Models</div>
      <input type="text" class="nim-search" placeholder="Search models..." oninput="filterNim(this.value)" id="nimSearch"/>
      <div class="nim-list" id="nimList">
        <div style="color:#888;font-size:0.8rem">Loading NIM models...</div>
      </div>
    </div>
  </aside>

  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('chat')">💬 Chat</div>
      <div class="tab" onclick="switchTab('aider')">🛠️ Aider</div>
    </div>
    <div class="selected-label" id="selectedLabel">No model selected</div>

    <div class="chat-wrap" id="chatTab">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <textarea id="input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="send" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
      </div>
    </div>

    <div class="aider-area" id="aiderTab">
      <div>
        <label style="font-size:0.85rem;color:#888;display:block;margin-bottom:4px">File path</label>
        <input type="text" id="aiderFile" placeholder="C:\path\to\file.py"/>
      </div>
      <div>
        <label style="font-size:0.85rem;color:#888;display:block;margin-bottom:4px">Instruction</label>
        <input type="text" id="aiderInstruction" placeholder="Fix all bugs and add error handling"/>
      </div>
      <button class="run" onclick="runAider()">▶ Run Aider</button>
      <pre id="aiderOutput" style="display:none"></pre>
    </div>
  </div>
</main>

<script>
let selectedModel = null;
let allNimModels = [];
let recommendations = {};

async function loadAll() {
  const [models, status, recs] = await Promise.all([
    fetch('/api/models').then(r => r.json()),
    fetch('/api/providers/status').then(r => r.json()),
    fetch('/api/recommendations').then(r => r.json()),
  ]);

  recommendations = recs;

  // Status bar
  document.getElementById('statusBar').innerHTML = Object.entries(status)
    .map(([k,v]) => `<span class="badge ${v}">${k}: ${v}</span>`).join('');

  // Local models
  const local = document.getElementById('localModels');
  local.innerHTML = models.local.length ? '' : '<div style="color:#888;font-size:0.78rem">Ollama offline</div>';
  models.local.forEach(m => local.appendChild(makeModelBtn(m, m)));

  // Cloud providers
  const cloud = document.getElementById('cloudModels');
  cloud.innerHTML = models.cloud.length ? '' : '<div style="color:#888;font-size:0.78rem">No API keys configured</div>';
  models.cloud.forEach(p => {
    const defaultModel = `${p.name === 'nvidia' ? 'nvidia_nim' : p.name}/default`;
    cloud.appendChild(makeModelBtn(`${p.name}${p.rpm ? ` (${p.rpm} rpm)` : ''}`, defaultModel));
  });

  // NIM models
  allNimModels = models.nim_models || [];
  renderNimList(allNimModels);
}

function makeModelBtn(label, model) {
  const btn = document.createElement('button');
  btn.className = 'model-btn';
  btn.textContent = label;
  btn.title = model;
  btn.onclick = () => selectModel(model, btn);
  return btn;
}

function renderNimList(list) {
  const el = document.getElementById('nimList');
  if (!list.length) {
    el.innerHTML = '<div style="color:#888;font-size:0.78rem">No NIM models found. Add NVIDIA_NIM_API_KEY to .env</div>';
    return;
  }
  el.innerHTML = '';
  list.forEach(m => el.appendChild(makeModelBtn(m, `nvidia_nim/${m}`)));
}

function filterNim(q) {
  const filtered = q ? allNimModels.filter(m => m.toLowerCase().includes(q.toLowerCase())) : allNimModels;
  renderNimList(filtered);
}

function selectModel(model, btn) {
  document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedModel = model;
  document.getElementById('selectedLabel').textContent = `Model: ${model}`;
  document.getElementById('sendBtn').disabled = false;
}

function recommend(task) {
  const rec = recommendations[task];
  if (!rec) return;
  const el = document.getElementById('recommendation');
  el.style.display = 'block';
  el.innerHTML = `<strong>Recommended:</strong> ${rec.model}<br><span style="color:#6a9a6a">${rec.reason}</span><br>
    <button class="model-btn" style="margin-top:6px" onclick="selectModelByName('${rec.model}')">Use this model</button>`;
}

function selectModelByName(model) {
  selectedModel = model;
  document.getElementById('selectedLabel').textContent = `Model: ${model}`;
  document.getElementById('sendBtn').disabled = false;
  document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
}

function showAsideTab(tab) {
  document.querySelectorAll('.aside-tab').forEach((t,i) => t.classList.toggle('active', ['models','tasks','nim'][i] === tab));
  document.getElementById('asideModels').style.display = tab === 'models' ? '' : 'none';
  document.getElementById('asideTasks').style.display = tab === 'tasks' ? '' : 'none';
  document.getElementById('asideNim').style.display = tab === 'nim' ? '' : 'none';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['chat','aider'][i] === tab));
  document.getElementById('chatTab').classList.toggle('hidden', tab !== 'chat');
  document.getElementById('aiderTab').classList.toggle('visible', tab === 'aider');
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function updateUsage(usage) {
  document.getElementById('usageBar').innerHTML = Object.entries(usage)
    .map(([k,v]) => `<span class="usage-item">${k}: ${v} req</span>`).join('');
}

async function sendMessage() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg || !selectedModel) return;
  input.value = '';
  addMessage('user', msg);
  document.getElementById('sendBtn').disabled = true;

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({model: selectedModel, message: msg})
    });
    if (r.status === 429) {
      addMessage('error', '⚠️ Rate limit reached — switch provider in sidebar');
      return;
    }
    const data = await r.json();
    if (data.error) { addMessage('error', data.error); return; }
    addMessage('assistant', data.reply);
    if (data.usage) updateUsage(data.usage);
  } catch(e) {
    addMessage('error', 'Error: ' + e.message);
  } finally {
    document.getElementById('sendBtn').disabled = !selectedModel;
  }
}

async function runAider() {
  const file = document.getElementById('aiderFile').value.trim();
  const instruction = document.getElementById('aiderInstruction').value.trim();
  if (!file || !instruction || !selectedModel) { alert('Select a model and fill in both fields.'); return; }
  const out = document.getElementById('aiderOutput');
  out.style.display = 'block';
  out.textContent = 'Running aider...';
  const r = await fetch('/api/aider', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model: selectedModel, file_path: file, instruction})
  });
  const data = await r.json();
  out.textContent = data.output || data.errors || 'Done.';
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
